<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Layout</title>
    <style>
        .flex-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .flex-row {
            display: flex;
            border: 1px solid black;
            margin-bottom: 5px;
        }
        .flex-cell {
            flex: 1;
            padding: 8px;
            border-right: 1px solid black;
            text-align: left;
        }
        .flex-cell:last-child {
            border-right: none;
        }
    </style>
</head>
<body>

<div class="flex-container">
    <div class="flex-row">
        <div class="flex-cell">Header 1</div>
        <div class="flex-cell">Header 2</div>
        <div class="flex-cell">Header 3</div>
    </div>
    <div class="flex-row">
        <div class="flex-cell">Row 1, Cell 1</div>
        <div class="flex-cell">Row 1, Cell 2</div>
        <div class="flex-cell">Row 1, Cell 3</div>
    </div>
    <div class="flex-row">
        <div class="flex-cell">Row 2, Cell 1</div>
        <div class="flex-cell">Row 2, Cell 2</div>
        <div class="flex-cell">Row 2, Cell 3</div>
    </div>
</div>

</body>
</html>
